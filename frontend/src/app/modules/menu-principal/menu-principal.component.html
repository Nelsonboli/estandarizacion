<div class="font-sans text-gray-800 bg-white animate-fade-in">
  <!-- Título superior -->
  <div class="mb-2 bg-white text-med py-1 px-3 min-h-[calc(100vh-13rem)] max-w-screen mx-auto">
    <div class="container m-auto grid grid-cols-1 gap-1 pt-15 md:grid-cols-2 lg:grid-cols-3">
      <!-- Acerca de Estandarizacion de procedimientos -->
      <div class="bg-white hover:bg-gray-100/30 disabled:opacity-50 rounded-lg">
        <div class="cursor-pointer flex justify-center items-center m-5" (click)="redireccion(1)">
          <img src="assets/menuprincipal/Acerca_de_Estandarizacion.svg"
            class=" hover:scale-110 transition-all duration-300 ease-in-out" alt="Estandarización de procedimientos">
        </div>
      </div>
      <!-- Recoleccion de informacion -->
      <div class="bg-white hover:bg-gray-100/30 disabled:opacity-50 rounded-lg">
        <div class="cursor-pointer flex justify-center items-center m-5" (click)="redireccion(2)">
          <img src="assets/menuprincipal/Recoleccion_de_Informacion.svg"
            class="hover:scale-110 transition-all duration-300 ease-in-out" alt="Recolección de información">
        </div>
      </div>
      <!-- Identificacion de requerimientos -->
      <div class="bg-white hover:bg-gray-100/30 disabled:opacity-50 rounded-lg">
        <div class="cursor-pointer flex justify-center items-center m-5" (click)="redireccion(3)">
          <img src="assets/menuprincipal/Identificacion_de_requerimientos.svg"
            class="hover:scale-110 transition-all duration-300 ease-in-out" alt="Identificación de requerimientos">
        </div>
      </div>
      <!-- Socializacion de procedimientos -->
      <div class="bg-white hover:bg-gray-100/30 disabled:opacity-50 rounded-lg">
        <div class="cursor-pointer flex justify-center items-center m-5"
          (click)="redireccion(4); ListaProcedimientos()">
          <img src="assets/menuprincipal/Socializacion_de_procedimientos.svg"
            class="hover:scale-110 transition-all duration-300 ease-in-out" alt="Socialización de procedimientos">
        </div>
      </div>
      <!-- Manual de usuario -->
      <div class="bg-white hover:bg-gray-100/30 disabled:opacity-50 rounded-lg">
        <div class="cursor-pointer flex justify-center items-center m-5" (click)="redireccion(5)">
          <img src="assets/menuprincipal/Manual_de_usuario.svg"
            class="hover:scale-110 transition-all duration-300 ease-in-out" alt="Manual de usuario">
        </div>
      </div>
    </div>
  </div>
</div>
