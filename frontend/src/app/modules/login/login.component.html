<div class="min-h-screen flex flex-col items-center justify-center bg-black-700 relative overflow-hidden font-roboto">
  <!-- Fondo decorativo -->
  <div class="absolute inset-0 z-0 pointer-events-none bg-black/90">
    <img src="assets/images/facultad_ingenieria.png" alt="facultad_ingenieria"
      class="w-full h-full object-cover object-center filter blur-[4px] opacity-70">
  </div>

  <!-- Títulos -->
  <div class="z-10 text-center mb-8 animate-fade-in px-4">
    <h1 class="text-4xl md:text-5xl font-bold text-white drop-shadow-xl mb-2 tracking-wide">Estandarización de
      Procedimientos</h1>

    <h1 class="text-3xl md:text-2xl font-semibold text-white/90 drop-shadow-md mb-10">Facultad de Ingeniería</h1>
  </div>

  <!-- Contenedor Principal -->
  <div
    class="z-10 w-full max-w-md p-8 m-4 bg-white/95 backdrop-blur-md rounded-2xl shadow-2xl border border-white/20 animate-fade-in">

    <!-- Logo o Encabezado -->
    <div class="text-center mb-8">
      <div
        class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-gradient-to-br from-[#fbba00] to-naranja shadow-md mb-4 transform hover:scale-105 transition-transform duration-300">
        <span class="material-symbols-outlined text-white text-4xl">lock</span>
      </div>
      <h1 class="text-3xl font-bold text-azul-oscuro mb-2">Acceso al Sistema</h1>
      <p class="text-margen-div text-sm">Por favor, ingrese la contraseña general para continuar al sistema de
        estandarización.</p>
    </div>

    <!-- Formulario -->
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-6">

      <!-- Campo de Contraseña -->
      <div>
        <label for="password" class="block text-sm font-medium text-gris-oscuro mb-2">Contraseña de Acceso</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <span class="material-symbols-outlined text-gray-400">key</span>
          </div>
          <input type="password" id="password" name="password" [(ngModel)]="password" required
            class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg text-gris-oscuro bg-gray-50 focus:outline-none focus:ring-2 focus:ring-azul-fondo focus:border-transparent transition-all duration-200"
            placeholder="Ingrese la contraseña" autocomplete="current-password">
        </div>
      </div>

      <!-- Mensaje de Error -->
      <div *ngIf="errorMessage"
        class="p-3 rounded-lg bg-unficacion/10 border border-unficacion/20 flex items-start space-x-2 animate-fade-in">
        <span class="material-symbols-outlined text-unficacion text-sm mt-0.5">error</span>
        <p class="text-sm text-unficacion">{{ errorMessage }}</p>
      </div>

      <!-- Botón de Envío -->
      <button type="submit" [disabled]="!password"
        class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-base font-medium text-white bg-gradient-to-r from-azul-oscuro via-90% to-azul-fondo
         hover:from-azul-oscuro hover:to-azul-fondo focus:outline-none focus:ring-1 focus:ring-offset-1 focus:ring-azul-oscuro/90 disabled:opacity-80 disabled:cursor-not-allowed transition-all duration-300 transform hover:-translate-y-0.5">
        <span>Ingresar al Sistema</span>
        <span class="material-symbols-outlined ml-2 text-lg">arrow_forward</span>
      </button>

    </form>

    <!-- Footer -->
    <div class="mt-8 text-center">
      <p class="text-xs text-gray-500">&copy; 2026 Universidad de Nariño<br>Facultad de Ingeniería</p>
    </div>
  </div>
</div>
