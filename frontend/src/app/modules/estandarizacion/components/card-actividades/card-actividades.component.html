<form [formGroup]="form">
    <div class="max-w-full mx-auto bg-white border border-gray-300 shadow-sm rounded-lg p-3 space-y-2 text-sm">
        <p class="text-grande font-medium text-gray-800 text-center">Actividades</p>
        <div formArrayName="checks" class="space-y-2">
            @for (opcion of subopciones; track opcion; let i = $index) {
            <label class="flex items-center space-x-2 mx-1 p-1"
                [ngClass]="{'opacity-100 cursor-not-allowed': checks.at(i).disabled}">
                <input type="checkbox" [formControlName]="i" class="accent-gray-400" />
                <span class="text-gray-700 text-grande px-2">{{ opcion }}</span>
            </label>
            }
        </div>
    </div>
</form>
