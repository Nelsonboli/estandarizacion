<div class="p-2 bg-white">
    <div class="text-med bg-azul-oscuro font-medium text-white p-2 border rounded-md mb-2 uppercase px-2">
        3. Identificación de requerimientos
    </div>
    <div class="bg-white/80 border border-gray-200 rounded-md p-4">
        <div
            class="flex flex-col sm:flex-row items-start sm:items-center justify-between bg-azul-fondo p-2 rounded-t-md gap-2">

            <div class="py-2 px-2 text-white sm:items-center text-med font-medium capitalize">
                Procedimientos
            </div>

            <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 w-full sm:w-auto">
                <!-- Botón -->
                <button (click)="abrirFormulario()"
                    class="flex items-center justify-center bg-verde-btn text-white text-xs px-3 py-1.5 rounded hover:bg-verde-btn/90 transition w-full sm:w-auto">
                    Agregar procedimiento
                </button>
                <!-- Input con icono lupa -->
                <div class="flex items-center relative w-full sm:w-60">
                    <input type="search" name="Buscar" (input)="buscarProcedimientos($event)"
                        placeholder="Buscar procedimiento"
                        class="pl-3 pr-8 py-1.5 text-black bg-white rounded-md text-xs border border-gray-300 focus:outline-none focus:ring-1 focus:ring-gray-200 w-full hover:bg-gray-100" />
                    <!-- Icono lupa -->
                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="w-4 h-4 absolute right-2 top-1/2 -translate-y-1/2 text-gray-500" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-4.35-4.35m0 0A7.5 7.5 0 1110.5 3a7.5 7.5 0 016.15 13.65z" />
                    </svg>
                </div>
            </div>
        </div>

        <!-- Modal -->
        @if (mostrarModal()) {
        <app-modal [visible]="mostrarModal()" [datoEditar]="datoEditar" (guardar)="guardarDatosFormulario($event)"
            (cerrar)="cerrarFormulario()">
        </app-modal>
        }

        <!-- Tabla -->
        <app-tabla-datos [data]="datosTablaProcedimiento()" [columnas]="datosService.columnasFormularioFTP"
            encabezadoGeneral="Lista de procedimientos" [accionesTemplate]="accionesPersonalizadas">
        </app-tabla-datos>

        <!-- Botones personalizados de la tabla -->
        <ng-template #accionesPersonalizadas let-dato>
            <div class="flex items-center justify-center space-x-1 gap-2">
                <button [routerLink]="['/identificacionrequerimientos/estandarizar', dato.id]"
                    class="bg-verde-btn hover:bg-verde-btn/90 text-white py-1 px-2 text-peq rounded">
                    Estandarizar
                </button>
                <button (click)="eliminarProcedimiento(dato)" title="Eliminar procedimiento" aria-label="Eliminar">
                    <img class="hover:brightness-120 w-4 h-4" src="assets/elementos/eliminar.svg" alt="Eliminar" />
                </button>
                <button (click)="editarProcedimiento(dato)" title="Editar procedimiento" aria-label="Editar">
                    <img class="hover:brightness-120 w-4 h-4" src="assets/elementos/editar.svg" alt="Editar" />
                </button>
            </div>
        </ng-template>

        <div>
            <app-navegacion [rutaAnterior]="'/recoleccioninformacion'" [rutaSiguiente]="'/socializacionprocedimientos'"
                (siguiente)="verListaProcedimientos()">
            </app-navegacion>
        </div>
    </div>
</div>
