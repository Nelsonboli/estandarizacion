<div class="w-full bg-gradient-to-r from-green-700 to-green-900">
  <div class="container mx-auto flex ">
    <a href="http://www.udenar.edu.co" class="block">
      <img class="h-24 w-auto pt-3 pb-3" src="assets/images/logo_udenar.svg" alt="Logo Udenar">
    </a>
  </div>
</div>
<!-- BARRA DE NAVEGACIÓN -->
<nav class="bg-naranja shadow-md w-full">
  <div class="mx-auto flex flex-col sm:flex-row sm:items-center">
    <!-- Título del módulo -->
    <div class="bg-green-900 px-10 pt-1 w-full sm:w-140 clip-romboide">
      <h6 class="text-white text-grande font-normal text-center italic">
        {{'Estandarización de procedimientos' | titlecase}}
      </h6>
    </div>
    <!-- Íconos -->
    @if (!esMenuPrincipal()) {
    <div class="flex items-center space-x-1 ml-2">
      <div class="hover:bg-naranja-oscuro transition p-1">
        <a (click)="colapsarMenu()" title="Colapsar menú">
          <img src="assets/elementos/contraer.svg" class="h-5 w-5" alt="Colapsar">
        </a>
      </div>
      <div class="hover:bg-naranja-oscuro transition p-1">
        <a routerLink="/menuprincipal" title="Dashboard">
          <img src="assets/elementos/dashboard.svg" class="h-5 w-5" alt="Dashboard">
        </a>
      </div>
      <div class="hover:bg-naranja-oscuro transition p-1">
        <a routerLink="/" title="Inicio">
          <img src="assets/elementos/inicio.svg" class="h-5 w-5" alt="Inicio">
        </a>
      </div>
    </div>
    }
  </div>
</nav>
