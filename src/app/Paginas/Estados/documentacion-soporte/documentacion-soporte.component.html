<div class="bg-white/80 border-1 border-gray-300 rounded-lg p-3 m-2 gap-4">
    @if (mostrarFormulario()) {
    <div class="w-full">
        <app-formreutilizable
            [campos]="columnasDAAC"
            [titulo]="DescripcionDAAC"
            [datoEditar]="editarformulario"
            (guardar)="guardarDatos($event)"
            (cerrar)="onCancelar()">
        </app-formreutilizable>
    </div>
    }
    @else {
    <div>
        <app-tablaprocedimiento
            [encabezadoGeneral]="'Formulario DAAC'"
            [data]="datosDAAC"
            [columns]="columnasDAAC"
            encabezadoGeneral="datos DAAC"
            [accionesTemplate]="accionesPersonalizadas">
        </app-tablaprocedimiento>

        <ng-template #accionesPersonalizadas let-dato>
            <div class="flex items-center justify-center space-x-1">
                <button (click)="eliminar(dato)" class="px-1 h-7 w-7"
                    title="Eliminar">
                    <img class="icono_titulos btntables hover:brightness-110"
                        src="https://sapiens.udenar.edu.co:3026/cdn//images/eliminar.svg" />
                </button>
                <button (click)="editar(dato)" class="px-1 h-7 w-7"
                    title="Editar">
                    <img class="icono_titulos btntables hover:brightness-110"
                        src="https://sapiens.udenar.edu.co:3026/cdn//images/editar_color.svg" />
                </button>
            </div>
        </ng-template>
    </div>
    }
</div>

@if (mostrarbase()) {
<div
    class="flex flex-row bg-white/80 border-1 border-gray-300 rounded-lg p-3 m-2 gap-4">
    <div
        class="flex flex-col w-1/3 flex-wrap md:flex-nowrap space-x-4 mb-4 gap-2">
        <div class>
            <label
                class="block text-sm font-medium text-gray-700 py-1">Documento
                base</label>
            <input
                [(ngModel)]="nuevoDato"
                class="w-full p-2 border rounded placeholder-gray-400"
                placeholder="Escribe el nombre del documento" />
        </div>
    </div>
    <div class="flex flex-col items-center mt-4 gap-4">
        <button
            (click)="agregarDato()"
            class=" bg-verde-btn hover:bg-verde-btn/90 transition-110 text-white px-4 py-2 rounded">
            Agregar
        </button>
    </div>
    <div class="flex w-2/3 flex-col overflow-x-auto">
        <app-tablaprocedimiento
            [data]="datosDocumentoBase"
            [columns]="columnaDocumento"
            [accionesTemplate]="accionesPersonalizadas"
            (eliminar)="eliminarDato($event)">
        </app-tablaprocedimiento>
        <ng-template #accionesPersonalizadas let-dato>
            <div class="flex items-center justify-center space-x-1">
                <button (click)="eliminarDato(dato)"
                    class="px-1 w-7 h-7"
                    title="Eliminar Proyecto">
                    <img
                        class="icono_titulos btntables hover:brightness-110"
                        src="https://sapiens.udenar.edu.co:3026/cdn//images/eliminar.svg">
                </button>
            </div>
        </ng-template>
    </div>
</div>
}
@if(mostrarbotones()){
<div
    class="flex flex-row bg-white/80 border-1 border-gray-300 rounded-lg p-3 m-2 gap-4 items-center justify-center">
    <button routerLink='/procedimiento'
        class="bg-verde-btn hover:bg-verde-btn/90 text-white px-4 py-2 rounded">
        Realizar Diagrama de procedimiento
    </button>

    <button (click)="descargarPDF()"
        class="px-4 py-2 bg-azul-oscuro text-white rounded hover:bg-azul-fondo">
        Descargar Documento DAAC
    </button>
</div>
}
