<div>
    <div class="font-sans text-gray-800 bg-white bor p-1 m-1">
        <div
            class="mb-2 space-x-0.5 min-h-screen bg-white text-med px-1 py-1 rounded-lg shadow-sm max-w-screen mx-auto">
            <div
                class="bg-azul-oscuro text-white p-2 border-2 text-right m-2 uperlowercase rounded-sm">
                Estandarización de procedimientos
            </div>

            <div
                class="flex flex-row flex-wrap gap-3 bg-white/80 border border-gray-300 rounded-lg p-2 m-2">
                @for (estado of estados; track estado; let i = $index) {
                <div
                    class="flex-1 flex flex-col items-center gap-2 group transition-transform hover:scale-102 min-w-[180px] max-w-[240px] duration-200 m-2">

                    <!-- Botón -->
                    <button
                        [disabled]="!estadoCompletos[i - 1] && i > 0"
                        class="w-full h-24 estados-basic-button flex flex-col items-center justify-center rounded border border-gray-500 transition-all duration-200 ease-in-out hover:shadow-md hover:scale-[1.02]"
                        [ngClass]="[
                (hoverIndex === i) ? 'shadow-sm ring-2 scale-105 bg-gradient-to-r from-green-700 to-green-800 hover:text-white ' : '',
                (buttonIndex === i) ? ' inset-shadow-sm inset-shadow-gray-500' : '',
                estadoCompletos[i] ? 'bg-green-600' : 'bg-gray-400'  ]"
                        (click)="onButtonClick(i)">
                        <span class="text-lg font-semibold">
                            {{ i + 1 }}
                        </span>
                        <h6 class="leading-tight text-center mt-1">
                            {{ estado }}
                        </h6>
                    </button>

                    <!-- Card cuando el estado está activo -->
                    @if (buttonIndex === i) {
                    <div class="w-full flex justify-center">
                        <div
                            class="w-[240px] bg-amber-50 rounded shadow transition-all duration-200">
                            <app-card [indice]="i"
                                (estadoCompleto)="onEstadoCompleto($event)" />
                        </div>
                    </div>
                    }
                </div>
                }
            </div>
            <!-- Sección dinámica -->
            <div
                class="bg-white/80 border-1 border-gray-300 rounded-lg p-1 m-1">
                @switch (buttonIndex) {
                @case (0) {
                <app-unificacion-criterios></app-unificacion-criterios>
                }
                @case (1) {
                <app-documentacion-soporte></app-documentacion-soporte>
                }
                @case (2) {
                <app-soporte-computacional></app-soporte-computacional>
                }
                @case (3) {
                <app-reglamento></app-reglamento>
                }
                @default {
                <app-inicio></app-inicio>
                }
                }
            </div>
        </div>
    </div>
</div>
